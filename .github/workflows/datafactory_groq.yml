name: Data Factory with GROQ

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write   # لتمكين الدفع إلى المستودع

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # لضمان الحصول على التاريخ الكامل

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - name: Restore previous output files
        uses: actions/cache@v4
        with:
          path: |
            data/enriched_training_data.jsonl
            data/failed_samples.jsonl
          key: datafactory-groq-${{ github.run_id }}
          restore-keys: datafactory-groq-

      - name: Run data factory
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python datafactory_groq.py

      - name: Commit and push data folder
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "لا توجد تغييرات في مجلد data."
          else
            git commit -m "Update data from workflow run ${{ github.run_id }}"
            git push
          fi
        continue-on-error: true   # لا تفشل workflow إذا تعذر الدفع

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: enriched-data
          path: |
            data/*.jsonl
            data/*.json
          if-no-files-found: warn
